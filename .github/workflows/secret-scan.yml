# ============================================
# Secret scanning — 阻止敏感信息进入 main
# ============================================
# 触发:
#   - push 到 main
#   - 所有 PR (opened / synchronize / reopened)
#   - 每日 06:00 UTC 定时全仓库扫描
# ============================================

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 每天 06:00 UTC 跑全仓库扫描（捕获 force-push 后可能漏掉的 blob）
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 必须 fetch 完整历史，否则只扫到 PR base commit 之后的内容
          fetch-depth: 0

      - name: Run gitleaks (full history)
        uses: gitleaks/gitleaks-action@v2
        env:
          # 项目自带的规则文件（含 DashScope / Qwen3 专属规则）
          GITLEAKS_CONFIG: .gitleaks.toml
          # 上传 SARIF 到 GitHub Security tab
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
        # 默认会拉最新版的 gitleaks（与本地版本保持一致建议固定）
        with:
          version: v8.30.1
          config-path: .gitleaks.toml
          # PR 时只扫新增 commit，避免误报
          # 1. push / schedule / dispatch: 扫全仓库
          # 2. PR: 默认只扫增量（GitHub Action 自动处理）
